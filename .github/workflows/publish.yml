name: Node.js Package Publish

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Audit check
        run: npm audit --audit-level=high

      - name: Build project
        run: npm run build

      - name: Check version and Publish
        shell: bash
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          
          NPM_VERSION=$(npm view akari-docs version 2>/dev/null || echo "0.0.0")

          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "🚀 New version found: $LOCAL_VERSION (from previous $NPM_VERSION) publishing to NPM..."
            npm publish --access public
          else
            echo "✅ Version $LOCAL_VERSION is already published. No update needed. Build Test completed!"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}